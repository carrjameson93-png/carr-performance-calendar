<!DOCTYPE html>
<html>
<head>
  <title>Carr Performance OS</title>
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #1a1f24, #070809);
      color: #e6e6e6;
      font-family: Arial, sans-serif;
    }

    .app { padding: 32px; }

    .header {
      border-bottom: 1px solid #2a2f35;
      padding-bottom: 20px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .subtitle {
      color: #9aa3ad;
      margin-top: 8px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 28px;
    }

    .calendar-card, .panel {
      background: linear-gradient(145deg, #151a1f, #0f1317);
      border: 1px solid #2a2f35;
      border-radius: 16px;
      padding: 22px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 20px 45px rgba(0,0,0,.45);
    }

    .legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 22px;
      font-size: 13px;
      color: #b9c0c7;
    }

    .legend span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(53, 20px);
      grid-template-rows: repeat(7, 20px);
      grid-auto-flow: column;
      gap: 6px;
      overflow-x: auto;
      padding: 8px 0 12px;
    }

    .day {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      position: relative;
      font-weight: bold;
      text-shadow: 0 1px 2px rgba(0,0,0,.8);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow:
        inset 2px 2px 3px rgba(255,255,255,.18),
        inset -2px -2px 4px rgba(0,0,0,.55),
        0 4px 7px rgba(0,0,0,.5);
      transition: transform .12s ease, box-shadow .12s ease;
    }

    .day:hover {
      transform: translateY(-4px) scale(1.45);
      z-index: 5;
      border-color: #fff;
      box-shadow:
        inset 2px 2px 3px rgba(255,255,255,.22),
        inset -2px -2px 4px rgba(0,0,0,.65),
        0 10px 18px rgba(0,0,0,.7);
    }

    .completed::after {
      content: "";
      position: absolute;
      width: 28px;
      height: 2px;
      background: #f2f2f2;
      transform: rotate(-35deg);
      box-shadow: 0 1px 3px #000;
    }

    .today {
      outline: 2px solid #ffffff;
      outline-offset: 2px;
    }

    .dark-horse { background: linear-gradient(145deg, #4a4f55, #202327); }
    .rebuild { background: linear-gradient(145deg, #3f9b6a, #1f563b); }
    .grind { background: linear-gradient(145deg, #c24b2a, #742514); }
    .harvest { background: linear-gradient(145deg, #c4962d, #6f5014); }

    .panel h2 {
      margin-top: 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .info {
      margin: 14px 0;
      padding-bottom: 12px;
      border-bottom: 1px solid #2a2f35;
    }

    .label {
      color: #8f98a3;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .value {
      font-size: 16px;
      margin-top: 4px;
      line-height: 1.4;
    }

    button {
      width: 100%;
      margin-top: 14px;
      padding: 12px;
      background: #d6d6d6;
      border: none;
      border-radius: 8px;
      color: #0b0d0f;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
    }

    button:hover { background: #ffffff; }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <h1>Carr Performance OS</h1>
      <div class="subtitle">365-Day Training Map</div>
    </div>

    <div class="layout">
      <div class="calendar-card">
        <div class="legend">
          <span><div class="dot dark-horse"></div>Dark Horse</span>
          <span><div class="dot rebuild"></div>Rebuild</span>
          <span><div class="dot grind"></div>The Grind</span>
          <span><div class="dot harvest"></div>Harvest</span>
          <span>Slash = completed</span>
        </div>

        <div class="calendar" id="calendar"></div>
      </div>

      <div class="panel" id="details">
        <h2>Mission Panel</h2>
        <p>Select a day to view the training assignment.</p>
      </div>
    </div>
  </div>

  <script>
    const calendar = document.getElementById("calendar");
    const details = document.getElementById("details");
    const year = 2027;

    const completedDays = JSON.parse(localStorage.getItem("completedDays") || "{}");

    const seasonData = {
      "Rebuild": {
        quality: "Joint Health & Stability",
        benchmark: "Single-leg landmine deadlift for load",
        prescription: {
          build1: "3 x 8/side @ controlled tempo",
          build2: "4 x 6/side @ moderate load",
          build3: "5 x 5/side @ heavier but clean",
          reload: "2-3 x 8/side @ light/moderate, perfect positions",
          test: "Build to heavy technical set of 3/side"
        },
        workouts: {
          1: "Single-arm DB Bench + Zone 2",
          2: "Long Run / Zone 2",
          3: "Single-leg Landmine Deadlift",
          4: "Upper Body Sweaty Pump",
          5: "Carries + Sprint Work",
          6: "Long Sweaty Pump / Zone 2",
          0: "Recovery"
        }
      },

      "The Grind": {
        quality: "Work Capacity",
        benchmark: "5K Run Time Trial + Strongman Circuit",
        prescription: {
          build1: "5 x 5 @ moderate load + Zone 2",
          build2: "6 x 4 @ heavier load + Zone 2",
          build3: "8 x 3 @ strong, fast reps + Zone 2",
          reload: "3 x 5 @ light/moderate, crisp speed",
          test: "5K time trial + strongman circuit"
        },
        workouts: {
          1: "Incline Barbell Bench + Zone 2",
          2: "Long Run / Zone 2",
          3: "Front Squats + Zone 2",
          4: "Long Full Body Sweaty Pump / Zone 2",
          5: "Z Press + Zone 2",
          6: "Long Run / Sweaty Pump / Strongman Circuit",
          0: "Recovery"
        }
      },

      "Harvest": {
        quality: "Hypertrophy & Anaerobic",
        benchmark: "Cleans + Push Press for Load",
        prescription: {
          build1: "4 x 8 @ controlled volume",
          build2: "5 x 6 @ heavier hypertrophy load",
          build3: "6 x 4 @ heavy strength-hypertrophy",
          reload: "3 x 8 @ light/moderate pump work",
          test: "Build to heavy clean + push press single"
        },
        workouts: {
          1: "Power Cleans",
          2: "Upper Body Sweaty Pump",
          3: "Push Press / Push Jerk",
          4: "Lower Body Sweaty Pump",
          5: "Deadlifts",
          6: "Long Zone 2 + Carries",
          0: "Recovery"
        }
      },

      "Dark Horse": {
        quality: "Low Gear Strength / Powerbuilding",
        benchmark: "1RM Front Squat, Deadlift, Bench",
        prescription: {
          build1: "5 x 5 @ 70-75%",
          build2: "5 x 3 @ 80-85%",
          build3: "6 x 2 @ 85-90%",
          reload: "3 x 5 @ 60-65%",
          test: "Build to 1RM"
        },
        workouts: {
          1: "Front Squats",
          2: "Upper Body Hypertrophy + Zone 2",
          3: "Deadlifts",
          4: "Lower Body Hypertrophy + Zone 2",
          5: "Bench",
          6: "Long Zone 2",
          0: "Recovery"
        }
      }
    };

    function getSeason(date) {
      const month = date.getMonth() + 1;
      if (month >= 1 && month <= 3) return "Dark Horse";
      if (month >= 4 && month <= 6) return "Rebuild";
      if (month >= 7 && month <= 9) return "The Grind";
      return "Harvest";
    }

    function getSeasonClass(season) {
      if (season === "Dark Horse") return "dark-horse";
      if (season === "Rebuild") return "rebuild";
      if (season === "The Grind") return "grind";
      return "harvest";
    }

    function getSeasonWeek(date) {
      const month = date.getMonth();
      const quarterStartMonth = Math.floor(month / 3) * 3;
      const quarterStart = new Date(date.getFullYear(), quarterStartMonth, 1);
      const pastDays = Math.floor((date - quarterStart) / 86400000);
      return Math.floor(pastDays / 7) + 1;
    }

    function getWave(seasonWeek) {
      if (seasonWeek <= 4) return 1;
      if (seasonWeek <= 8) return 2;
      return 3;
    }

    function getWeekOfWave(seasonWeek) {
      if (seasonWeek >= 13) return "Test";
      return ((seasonWeek - 1) % 4) + 1;
    }

    function getWeekType(seasonWeek) {
      if (seasonWeek >= 13) return "Test Week";
      if (seasonWeek % 4 === 0) return "Reload Week";
      return "Build Week";
    }

    function getPrescription(season, seasonWeek) {
      const weekOfWave = getWeekOfWave(seasonWeek);
      const p = seasonData[season].prescription;

      if (weekOfWave === "Test") return p.test;
      if (weekOfWave === 4) return p.reload;
      if (weekOfWave === 1) return p.build1;
      if (weekOfWave === 2) return p.build2;
      return p.build3;
    }

    function getWorkout(date, season, seasonWeek) {
      if (seasonWeek >= 13) return "Benchmark / Test Week: " + seasonData[season].benchmark;
      return seasonData[season].workouts[date.getDay()];
    }

    function saveCompleted() {
      localStorage.setItem("completedDays", JSON.stringify(completedDays));
    }

    function renderCalendar() {
      calendar.innerHTML = "";

      const start = new Date(year, 0, 1);
      const end = new Date(year, 11, 31);
      const today = new Date();

      for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        const date = new Date(d);
        const dateKey = date.toISOString().split("T")[0];
        const season = getSeason(date);
        const seasonWeek = getSeasonWeek(date);
        const wave = getWave(seasonWeek);
        const weekType = getWeekType(seasonWeek);

        const square = document.createElement("div");
        square.className = `day ${getSeasonClass(season)}`;
        square.innerText = `${wave}.${getWeekOfWave(seasonWeek)}`;
        square.title = date.toDateString();

        if (completedDays[dateKey]) square.classList.add("completed");

        if (
          date.getFullYear() === today.getFullYear() &&
          date.getMonth() === today.getMonth() &&
          date.getDate() === today.getDate()
        ) {
          square.classList.add("today");
        }

        square.onclick = function () {
          const workout = getWorkout(date, season, seasonWeek);
          const prescription = getPrescription(season, seasonWeek);

          details.innerHTML = `
            <h2>${date.toDateString()}</h2>

            <div class="info">
              <div class="label">Season</div>
              <div class="value">${season}</div>
            </div>

            <div class="info">
              <div class="label">Primary Quality</div>
              <div class="value">${seasonData[season].quality}</div>
            </div>

            <div class="info">
              <div class="label">Wave / Week</div>
              <div class="value">Wave ${wave} / Week ${getWeekOfWave(seasonWeek)}</div>
            </div>

            <div class="info">
              <div class="label">Week Type</div>
              <div class="value">${weekType}</div>
            </div>

            <div class="info">
              <div class="label">Workout</div>
              <div class="value">${workout}</div>
            </div>

            <div class="info">
              <div class="label">Lift Prescription</div>
              <div class="value">${prescription}</div>
            </div>

            <div class="info">
              <div class="label">Season Benchmark</div>
              <div class="value">${seasonData[season].benchmark}</div>
            </div>

            <button onclick="toggleComplete('${dateKey}')">
              ${completedDays[dateKey] ? "Mark Incomplete" : "Complete Day"}
            </button>
          `;
        };

        calendar.appendChild(square);
      }
    }

    function toggleComplete(dateKey) {
      if (completedDays[dateKey]) {
        delete completedDays[dateKey];
      } else {
        completedDays[dateKey] = true;
      }

      saveCompleted();
      renderCalendar();
    }

    renderCalendar();
  </script>
</body>
</html>
